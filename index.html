<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wag With Kim – Dog Walking Seattle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      color: #111;
      background-color: #f5f5f5;
    }

    /* NEW LOGO */
    .site-logo {
      width: 260px;
      display: block;
      margin: 20px auto;
    }

    /* HERO SECTION — BACKED UP (NOT ZOOMED) */
    .hero {
      width: 100%;
      height: 500px;
      background-image: url('hero-clean.jpg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      margin-bottom: 30px;
    }

    /* CONTENT */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }

    .tagline {
      font-size: 1.4rem;
      margin-bottom: 20px;
      color: #444;
    }

    .features {
      list-style: none;
      margin-bottom: 25px;
      font-size: 1.1rem;
    }

    .features li {
      margin: 8px 0;
    }

    .cta-box {
      background-color: #7a4de8;
      color: white;
      padding: 15px 20px;
      border-radius: 10px;
      font-size: 1.2rem;
      display: inline-block;
      margin-bottom: 30px;
    }

    .contact {
      margin-top: 30px;
      font-size: 1rem;
      color: #333;
    }

    .contact div {
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <!-- NEW LOGO AT TOP -->
  <img src="logo-main.png" alt="Wag With Kim Logo" class="site-logo">

  <!-- HERO IMAGE -->
  <section class="hero"></section>

  <!-- MAIN CONTENT -->
  <div class="content">
    <div class="tagline">Happy Dogs. Happy Walks. Happy You.</div>

    <ul class="features">
      <li>Reliable & Trustworthy</li>
      <li>Loving Care</li>
      <li>Tail-Wagging Adventures</li>
    </ul>

    <div class="cta-box">Let’s go for a walk!</div>

    <div class="contact">
      <div><strong>Phone:</strong> 206-294-0602</div>
      <div><strong>Email:</strong> wagwithkim@gmail.com</div>
      <div><strong>Instagram:</strong> @WagWithKim</div>
    </div>
  </div>

</body>
</html>
